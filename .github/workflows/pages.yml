name: Build and Deploy Pages

on:
  push:
    branches: [main, 'claude/**']
  workflow_dispatch:
  schedule:
    - cron: '23 11 * * *'

permissions:
  contents: read
  pages: write
  id-token: write
  administration: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci || npm install
      - run: npm run build
      - name: Allow all branches to deploy to Pages
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/environments/github-pages" \
            -d '{"deployment_branch_policy":{"protected_branches":false,"custom_branch_policies":false}}'
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
