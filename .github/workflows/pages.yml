name: Build and Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci || npm install
      - name: Pull published sensor-data branch into generated/
        run: |
          set -euo pipefail
          rm -rf generated .sensor-data-worktree
          git fetch origin sensor-data --depth=1
          git worktree add .sensor-data-worktree FETCH_HEAD
          cp -R .sensor-data-worktree/data generated
          rm -rf .sensor-data-worktree
      - run: npm run build:site:shell
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
